<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Syslog Server</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/><path d="M7 8h.01M11 8h6M7 12h.01M11 12h6"/>
        </svg>
        <h1>Syslog Server</h1>
        <p>Connectez-vous pour accéder au tableau de bord</p>
      </div>

      <form id="login-form" class="login-form">
        <div class="form-group">
          <label for="username">Nom d'utilisateur</label>
          <input type="text" id="username" name="username" autocomplete="username"
                 placeholder="admin" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password"
                 autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <div id="login-error" class="alert alert-danger" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Se connecter
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('login-error');
      btn.disabled = true;
      btn.textContent = 'Connexion…';
      err.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          })
        });
        if (res.ok) {
          window.location = '/dashboard';
        } else {
          const data = await res.json();
          err.textContent = data.detail || 'Identifiants invalides';
          err.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Se connecter';
        }
      } catch {
        err.textContent = 'Erreur réseau';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
